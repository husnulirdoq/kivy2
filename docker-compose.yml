version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: wellbeing
      POSTGRES_PASSWORD: wellbeing
      POSTGRES_DB: wellbeing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellbeing"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wellbeing:wellbeing@postgres:5432/wellbeing
    volumes:
      - ./backend:/app

  admin:
    build: ./admin
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./admin:/app

volumes:
  postgres_data:
