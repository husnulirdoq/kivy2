version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test.db
    volumes:
      - ./backend:/app

  admin:
    build: ./admin
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
