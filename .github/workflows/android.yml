name: Android CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build APK with Buildozer Docker
        uses: docker://ghcr.io/kivy/buildozer:latest
        with:
          entrypoint: /bin/bash
          args: -c "cd kivy && echo 'n' | buildozer android debug"
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wellbeing-apk
          path: kivy/bin/*.apk
        continue-on-error: true
