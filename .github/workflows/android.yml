# Trigger rebuild
name: Android CI/CD

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip
        pip install --upgrade pip setuptools wheel cython

    - name: Install Android command-line tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
        sdkmanager --version

    - name: Install Android SDK build-tools
      run: |
        export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;37.0.0"

    - name: Install Buildozer
      run: |
        pip install buildozer
        pip install python-for-android

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wellbeing-apk
        path: bin/*.apk

  distribute:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Firebase CLI
      run: curl -sL https://firebase.tools | bash

    - name: Upload to Firebase App Distribution
      run: |
        firebase appdistribution:distribute bin/*.apk \
          --app <1:308895666340:android:7e4b4a92f2ba707fd35631> \
          --groups testers \
          --token ${{ secrets.FIREBASE_TOKEN }}

