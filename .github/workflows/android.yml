name: Android CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build APK with Docker (Manual Control)
        run: |
          # Kita jalankan docker secara manual supaya bisa pakai perintah 'yes'
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostpython3 \
            -v ${{ github.workspace }}:/home/user/build \
            -e APP_ANDROID_ACCEPT_SDK_LICENSE=True \
            ghcr.io/kivy/buildozer:latest \
            sh -c "yes | buildozer android debug"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wellbeing-apk
          path: bin/*.apk

  distribute:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: wellbeing-apk
          path: bin/

      - name: Set up Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute bin/*.apk \
            --app "1:308895666340:android:7e4b4a92f2ba707fd35631" \
            --groups "testers" \
            --token ${{ secrets.FIREBASE_TOKEN }}