name: Android CI/CD

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: $HOME/.buildozer/android/platform/android-sdk
  ANDROID_SDK_ROOT: $HOME/.buildozer/android/platform/android-sdk
  PATH: /usr/bin:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$PATH

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip tar
        pip install --upgrade pip setuptools wheel cython
        pip install buildozer python-for-android

    - name: Install Android command-line tools
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools.zip
        mv cmdline-tools latest
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --version

    - name: Install Android SDK build-tools
      run: |
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" "platforms;android-34" "build-tools;37.0.0"

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wellbeing-apk
        path: bin/*.apk

  distribute:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Firebase CLI
      run: curl -sL https://firebase.tools | bash

    - name: Upload to Firebase App Distribution
      run: |
        firebase appdistribution:distribute bin/*.apk \
          --app <1:308895666340:android:7e4b4a92f2ba707fd35631> \
          --groups testers \
          --token ${{ secrets.FIREBASE_TOKEN }}
