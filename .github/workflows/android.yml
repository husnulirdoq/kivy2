name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          python3-setuptools \
          python3-pip \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libssl-dev \
          libbz2-dev \
          libsqlite3-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libreadline-dev \
          tk-dev \
          libgdbm-dev \
          libdb5.3-dev \
          libexpat1-dev \
          liblzma-dev \
          libnss3-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          m4 \
          openjdk-17-jdk \
          unzip \
          zip \
          ccache \
          lld

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0"  # Buildozer sering bermasalah dengan Cython 3.x
        pip install buildozer

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Git Configuration
      run: |
        # Meningkatkan buffer git untuk menghindari RPC failed / 500 error
        git config --global http.postBuffer 524288000
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999

    - name: Upgrade Build Tools
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0"
        pip install buildozer
        
    - name: Build APK
      run: |
        buildozer -v android debug
      env:
        # Memastikan JAVA_HOME terisi otomatis dari setup-java
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wellbeing-apk
        path: bin/*.apk

  distribute:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Download APK from build job
      uses: actions/download-artifact@v4
      with:
        name: wellbeing-apk
        path: bin/

    - name: Set up Firebase CLI
      run: curl -sL https://firebase.tools | bash

    - name: Upload to Firebase App Distribution
      run: |
        firebase appdistribution:distribute bin/*.apk \
          --app "1:308895666340:android:7e4b4a92f2ba707fd35631" \
          --groups "testers" \
          --token ${{ secrets.FIREBASE_TOKEN }}