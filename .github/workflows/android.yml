name: Android CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build APK with Buildozer Docker
        uses: docker://ghcr.io/kivy/buildozer:latest
        with:
          entrypoint: /bin/sh
          args: -c "cd kivy && buildozer android debug || echo 'Build attempt completed'"
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          PYTHONUNBUFFERED: "1"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wellbeing-apk
          path: kivy/bin/*.apk
        continue-on-error: true

  distribute:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: wellbeing-apk
          path: bin/
        continue-on-error: true

      - name: Set up Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute bin/*.apk \
            --app "1:308895666340:android:7e4b4a92f2ba707fd35631" \
            --groups "testers" \
            --token ${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true
